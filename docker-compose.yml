version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: helpdesk_postgres
    restart: always
    environment:
      POSTGRES_DB: helpdesk_db
      POSTGRES_USER: helpdesk_user
      POSTGRES_PASSWORD: helpdesk_pass
    ports:
      - "5432:5432"
    volumes:
      - helpdesk_postgres_data:/var/lib/postgresql/data

volumes:
  helpdesk_postgres_data: